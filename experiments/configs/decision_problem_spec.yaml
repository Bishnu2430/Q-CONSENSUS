# Q-CONSENSUS Decision Problem Specification
# Version: 1.0

problem_definition:
  type: "binary"
  name: "abstract_binary_consensus"
  description: |
    Abstract binary decision problem where N agents must collectively
    decide between options {0, 1} based on a shared environmental signal.
    No domain-specific semantics are imposed. This is a fundamental
    study of quantum-classical decision coordination.

  decision_space:
    output_type: "binary"
    valid_outputs: [0, 1]
    output_semantics: "abstract"

  environment_state:
    type: "parametric_signal"
    dimension: 1
    range: [0.0, 1.0]
    interpretation: |
      Environment parameter θ ∈ [0,1] represents external condition.

      Interpretation:
      - θ = 0.0: Strong signal favoring decision 0
      - θ = 0.5: Neutral/ambiguous signal
      - θ = 1.0: Strong signal favoring decision 1

      Expected behavior:
      - θ < 0.2: System should reliably output 0
      - 0.4 ≤ θ ≤ 0.6: Uncertain regime, variance acceptable
      - θ > 0.8: System should reliably output 1

    noise_model: "none"

success_criteria:
  primary_metric: "decision_stability"
  stability_threshold: 0.95

  secondary_metrics:
    - name: "variance_reduction"
      target: "Demonstrate σ² ∝ 1/K relationship"

    - name: "consensus_convergence_rate"
      target: "Identify minimum K for stable consensus"

    - name: "cost_efficiency"
      target: "Establish cost-stability Pareto frontier"

  ideal_behavior: |
    System should produce deterministic decisions (>95% stability) when 
    environment signal is strongly polarized (θ < 0.2 or θ > 0.8).

    In neutral regime (0.4 < θ < 0.6), some uncertainty is expected
    and acceptable. This is not a failure mode.

  failure_modes:
    - name: "variance_explosion"
      condition: "σ²_D > 0.25 when θ < 0.2"
      severity: "critical"

    - name: "consensus_instability"
      condition: "Decision flips between trials when θ extreme"
      severity: "critical"

    - name: "cost_explosion"
      condition: "Requires K > 50,000 for stability"
      severity: "acceptable (proves negative result)"

assumptions:
  # Environment
  - "Agents observe identical environment state (perfect information)"
  - "No noise in environment signal transmission"
  - "Environment is static during decision process"
  - "Environment parameter θ is uniformly accessible"

  # Agents
  - "Agents do not learn or adapt during experiments"
  - "All agents have equal computational resources"
  - "Agent quantum circuits execute independently"
  - "No inter-agent communication"

  # Coordination
  - "Classical coordination has zero latency"
  - "Perfect transmission of measurement results"
  - "Deterministic aggregation function"

  # Quantum
  - "Quantum measurements are ideal (no SPAM errors)"
  - "Perfect quantum gates (no decoherence)"
  - "Born rule applies exactly"

explicit_exclusions:
  # Not studying
  - "Real-world deployment scenarios"
  - "Adversarial or Byzantine agents"
  - "Noisy quantum channels"
  - "Adaptive parameter tuning during experiments"
  - "Quantum hardware execution (simulation only)"
  - "Temporal dynamics (single-shot decisions)"
  - "Multi-objective decision problems"
  - "Continuous decision spaces"

  # Not claiming
  - "Quantum advantage or supremacy"
  - "Production readiness"
  - "Commercial viability"
  - "Scalability to 100+ agents"

research_questions:
  primary: |
    How does quantum measurement variance propagate through classical
    coordination to affect system-level decision stability?

  secondary:
    - "What shot count K is required for deterministic consensus?"
    - "How does agent heterogeneity affect convergence properties?"
    - "Where does quantum approach provide no advantage over classical sampling?"
    - "What is the cost-stability trade-off function?"

  expected_answers:
    - "Variance scales as 1/K (quadratic cost for linear improvement)"
    - "Agent heterogeneity improves robustness in neutral regime"
    - "No advantage for simple aggregation functions (negative result)"
    - "Cost grows prohibitively for high stability requirements"

experimental_validation:
  baseline_comparisons:
    - name: "classical_random_sampling"
      description: "Classical agents sampling from Bernoulli(p(θ))"

    - name: "deterministic_threshold"
      description: "Simple θ > 0.5 threshold rule"

    - name: "oracle"
      description: "Perfect knowledge of θ, optimal decision"

  hypothesis_tests:
    - H0: "Quantum agents equivalent to classical sampling"
      test: "Two-sample KS test on decision distributions"
      significance: 0.05

    - H0: "Variance scales as 1/K"
      test: "Linear regression log(σ²) vs log(K)"
      expected_slope: -1.0

  revision_history:
    - version: "1.0"
      date: null
      changes: "Initial specification"
